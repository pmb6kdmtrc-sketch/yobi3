function addLog(msg){if(!G.battle)return;G.battle.log=G.battle.log||[];G.battle.log.push(msg);var log=document.getElementById("bLog");if(log){log.appendChild(h("div",{},msg));log.scrollTop=log.scrollHeight;}}

function doAction(action){
  var b=G.battle;if(!b)return;
  var comp=G.activeComp?COMPANIONS.find(function(c){return c.id===G.activeComp;}):null;
  var wb=(WEAPONS.find(function(w){return w.id===G.eqWeapon;})||{atk:0}).atk;
  function calc(base){return Math.floor(base*(0.85+Math.random()*0.3));}
  if(action==="flee"){if(!b.enemy.isBoss){G.pMP=Math.max(0,G.pMP-5);G.battle=null;save();render();}return;}
  var dmg=0,mpCost=0,heal=0,msg="",nc=b.combo;
  if(action==="attack"){
    dmg=Math.floor(calc(20+wb+G.sAtk+(b.atkBuff||0))*(1+Math.min(nc,10)*0.1));
    b.atkBuff=0;nc++;msg="\u2694\ufe0f "+(nc>=5?"\ud83d\udd25\u30b3\u30f3\u30dc"+nc+"Hit! ":"")+"\u653b\u6483\uff01 "+dmg+"\u30c0\u30e1\uff01";
  }else if(action==="skill"){
    if(b.pMP<20)return;
    dmg=Math.floor(calc(45+Math.floor(wb*1.5)+G.sAtk+(b.atkBuff||0))*(1+Math.min(nc,10)*0.15));
    b.atkBuff=0;mpCost=20;nc+=2;msg="\u2728 \u8ad6\u8a3c\u30d6\u30ec\u30a4\u30af\uff01 "+dmg+"\u5927\u30c0\u30e1\uff01";
  }else if(action==="companion"){
    if(!comp||b.pMP<comp.mp)return;
    var clv=compLv(comp.id);
    var boost=1+clv*0.15; // \u4ef2\u9593\u30ec\u30d9\u30eb\u3067\u5a01\u529b\u30a2\u30c3\u30d7
    var r=comp.fn({pHP:b.pHP,pMaxHP:G.pMaxHP,pMP:b.pMP,eHP:b.eHP});
    // \u30c0\u30e1\u30fc\u30b8\u30fb\u56de\u5fa9\u3092\u30ec\u30d9\u30eb\u5206\u5f37\u5316
    if(r.eHP!==undefined&&r.eHP<b.eHP){var dealt=Math.floor((b.eHP-r.eHP)*boost);r.eHP=Math.max(0,b.eHP-dealt);}
    if(r.pHP!==undefined&&r.pHP>b.pHP){var healed=Math.floor((r.pHP-b.pHP)*boost);r.pHP=Math.min(G.pMaxHP,b.pHP+healed);}
    b.eHP=r.eHP!==undefined?r.eHP:b.eHP;b.pHP=r.pHP!==undefined?r.pHP:b.pHP;
    b.pMP=Math.max(0,(r.pMP!==undefined?r.pMP:b.pMP)-comp.mp);
    if(r.frozen)b.frozen=true;if(r.shield)b.shield=r.shield;
    b.combo=nc+1;addLog(r.log+(clv>0?" (Lv"+(clv+1)+")":""));
    gainCompExp(comp.id);
    if(b.eHP<=0)return onVictory();
    setTimeout(enemyTurn,600);renderBattle();return;
  }else if(action==="heal"){
    if(b.pMP<15)return;
    heal=Math.floor(10+Math.random()*15);mpCost=15;msg="\ud83d\udc8a \u56de\u5fa9\uff01 HP+"+heal+"\uff01";
  }
  b.eHP=action!=="heal"?Math.max(0,b.eHP-dmg):b.eHP;
  b.pHP=action==="heal"?Math.min(G.pMaxHP,b.pHP+heal):b.pHP;
  b.pMP=Math.max(0,b.pMP-mpCost);b.combo=nc;b.maxCombo=Math.max(b.maxCombo||0,nc);
  addLog(msg);
  if(b.eHP<=0)return onVictory();
  setTimeout(enemyTurn,600);renderBattle();
}

function enemyTurn(){
  var b=G.battle;if(!b)return;
  var ab=(ARMORS.find(function(a){return a.id===G.eqArmor;})||{def:0}).def;
  // \u7d20\u65e9\u3055\u306b\u3088\u308b\u56de\u907f\uff08\u6700\u592730%\uff09
  var evadeRate=Math.min(0.3,G.sSpd*0.012);
  if(Math.random()<evadeRate){addLog("\u26a1 \u7d20\u65e9\u304f\u56de\u907f\uff01");renderBattle();return;}
  if(b.frozen){b.frozen=false;addLog("\u2744\ufe0f \u6575\u306f\u6c37\u7d50\uff01\u653b\u6483\u3067\u304d\u306a\u3044\uff01");renderBattle();return;}
  var raw=Math.floor((b.enemy.atk||10)*(0.85+Math.random()*0.3));
  var dmg=b.shield>0?Math.floor(raw/2):raw;if(b.shield>0)b.shield--;
  var red=Math.max(1,dmg-Math.floor(ab/3)-Math.floor(G.sDef/2));b.pHP=Math.max(0,b.pHP-red);b.combo=0;
  addLog("\ud83d\udc79 "+b.enemy.name+"\u306e\u653b\u6483\uff01 "+red+"\u30c0\u30e1\u2026");
  if(b.pHP<=0){
    if(b.revive){b.revive=false;b.pHP=Math.floor(G.pMaxHP*0.4);addLog("\ud83e\udeb6 \u4e0d\u6b7b\u9ce5\u306e\u7fbd\u3067\u5fa9\u6d3b\uff01\uff01");renderBattle();return;}
    addLog("\ud83d\udc80 \u5012\u308c\u3066\u3057\u307e\u3063\u305f\u2026");G.pHP=Math.floor(G.pMaxHP*0.3);save();
    setTimeout(function(){showResult(false,b.enemy,0,0);},1000);return;
  }
  renderBattle();
}

function onVictory(){
  var b=G.battle;
  var xp=(b.enemy.isBoss?80+G.area*20:20)+Math.floor((b.combo||0)*5);
  G.pHP=b.pHP;G.pMP=Math.min(50,b.pMP+10);
  if(b.idx>=0){G.completed[b.idx]=true;G.completedDate=new Date().toDateString();}
  G.totalWins++;G.maxCombo=Math.max(G.maxCombo,b.combo||0);
  addTodayXP(xp);earnXP(xp);
  var drop=null;
  if(Math.random()<0.25){drop=Object.assign({},ITEMS[Math.floor(Math.random()*ITEMS.length)]);G.inventory.push(drop);}
  else if(b.enemy.isBoss&&Math.random()<0.4){
    var ew2=WEAPONS.filter(function(w){return w.id!=="w0";});
    if(ew2.length){var dw=ew2[Math.floor(Math.random()*ew2.length)];drop=Object.assign({},dw,{isEquip:"weapon"});G.inventory.push(drop);}
  }
  if(b.enemy.isBoss){
    G.bossKills++;G.completed["boss"]=true;
    var gsi=globalSubIndex();
    if(!G.clearedSubs.includes(gsi))G.clearedSubs.push(gsi);
    G.defeated=0;fireConfetti();
    if(b.enemy.isAreaBoss){
      // \u30a8\u30ea\u30a2\u30dc\u30b9\u64c3\u7834\uff1a\u4ef2\u9593\u52e7\u8a98+\u6b21\u30a8\u30ea\u30a2\u3078
      if(!G.clearedAreas.includes(G.area))G.clearedAreas.push(G.area);
      var avail=COMPANIONS.filter(function(c){return !G.companions.find(function(cc){return cc.id===c.id;});});
      var recruit=null;
      if(avail.length){recruit=avail[Math.floor(Math.random()*avail.length)];}
      // \u6b21\u306e\u30a8\u30ea\u30a2\u3078
      if(G.area<AREAS.length-1){G.area++;G.subArea=0;}
      save();showResult(true,b.enemy,xp,Math.floor((b.combo||0)*5),drop,recruit);return;
    }else{
      // \u5c0f\u30dc\u30b9\u64c3\u7834\uff1a\u6b21\u306e\u30b5\u30d6\u30a8\u30ea\u30a2\u3078
      if(G.subArea<3)G.subArea++;
      save();showResult(true,b.enemy,xp,Math.floor((b.combo||0)*5),drop,null);return;
    }
  }else{G.defeated++;}
  var today=new Date().getDay(),tasks=WEEKLY_PLAN[today];
  if(tasks.every(function(_,i){return !!G.completed[i];})){G.fullDays++;earnXP(50);}
  save();showResult(true,b.enemy,xp,Math.floor((b.combo||0)*5),drop,null);
}

  app.appendChild(wrap);
  setTimeout(function(){inp.focus();},100);
}
function startApp(){
  load();
  try{var mc=localStorage.getItem("yobiCards");if(mc)flashState.myCards=JSON.parse(mc);}catch(e){}
  (function(){
    var today=new Date().toDateString();
    if(G.lastLogin!==today){
      var yesterday=new Date(Date.now()-86400000).toDateString();
      G.loginStreak=G.lastLogin===yesterday?G.loginStreak+1:1;
      G.lastLogin=today;var bonus=50+G.loginStreak*10;G.points+=bonus;save();
      setTimeout(function(){toast("\ud83c\udf81 \u30c7\u30a4\u30ea\u30fc\u30dc\u30fc\u30ca\u30b9\uff01 +"+bonus+"XP ("+G.loginStreak+"\u65e5\u9023\u7d9a)");},500);
    }
  })();
  render();
}
if(checkGate()){startApp();}else{showGate();}
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}

</script>
